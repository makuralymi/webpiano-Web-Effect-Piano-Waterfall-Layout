<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebPiano</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app">
    <!-- Top controls bar -->
    <div id="controls">
      <div class="logo">
        <span class="logo-icon">♪</span>
        <span class="logo-text">WebPiano</span>
      </div>

      <div class="control-group">
        <button id="btn-import" class="btn btn-accent">
          <span>导入 MIDI</span>
          <input id="file-input" type="file" accept=".mid,.midi" style="display:none">
        </button>
        <button id="btn-bg" class="btn">背景设置</button>
        <button id="btn-toggle-grid" class="btn active" title="显示/隐藏小节线">小节线</button>
        <button id="btn-track-colors" class="btn" title="自定义轨道颜色" disabled>轨道颜色</button>
      </div>

      <div class="control-group transport">
        <button id="btn-play" class="btn btn-icon" disabled title="播放 (Space)">
          <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
        </button>
        <button id="btn-stop" class="btn btn-icon" disabled title="停止">
          <svg viewBox="0 0 24 24" width="18" height="18"><rect x="4" y="4" width="16" height="16" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="control-group slider-group">
        <label>速度</label>
        <input type="range" id="slider-speed" min="25" max="200" value="100" step="5">
        <span id="speed-display">1.0×</span>
      </div>

      <div class="control-group slider-group">
        <label>音量</label>
        <input type="range" id="slider-volume" min="0" max="100" value="75" step="1">
      </div>

      <div id="song-info">
        <span id="song-title">— 未加载 MIDI —</span>
        <span id="song-time"></span>
      </div>
    </div>

    <!-- Progress bar -->
    <div id="progress-track">
      <div id="progress-fill"></div>
      <div id="progress-cursor"></div>
    </div>

    <!-- Main canvas: waterfall + keyboard -->
    <canvas id="main-canvas"></canvas>

    <!-- Keyboard shortcut hint -->
    <div id="kb-hint">键盘演奏: Z–M / Q–U (两个八度) · Space 播放/暂停</div>
  </div>

  <div id="bg-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="bg-modal-title">
      <div class="modal-header">
        <h2 id="bg-modal-title">自定义背景</h2>
        <button id="btn-bg-close" class="btn btn-icon" title="关闭">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <label class="field-label" for="bg-url">背景图片 URL</label>
        <div class="field-row">
          <input id="bg-url" class="text-input" type="url" placeholder="https://example.com/bg.jpg">
          <button id="btn-bg-apply-url" class="btn btn-accent">应用 URL</button>
        </div>

        <div class="sep">或</div>

        <label class="field-label" for="bg-file">本地图片</label>
        <div class="field-row">
          <input id="bg-file" type="file" accept="image/*">
          <button id="btn-bg-apply-file" class="btn btn-accent">应用本地图片</button>
        </div>

        <div class="sep">背景透明度</div>

        <div class="field-row opacity-row">
          <input id="bg-opacity" type="range" min="0" max="100" value="90" step="1">
          <span id="bg-opacity-display">90%</span>
        </div>
      </div>

      <div class="modal-footer">
        <button id="btn-bg-clear" class="btn">恢复默认</button>
      </div>
    </div>
  </div>

  <div id="track-colors-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="tc-modal-title">
      <div class="modal-header">
        <h2 id="tc-modal-title">轨道颜色</h2>
        <button id="btn-tc-close" class="btn btn-icon" title="关闭">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
      </div>
      <div id="tc-modal-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="btn-tc-reset" class="btn">重置默认颜色</button>
      </div>
    </div>
  </div>
  <!-- JS files loaded in dependency order -->
  <script src="./js/constants.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/midi-parser.js"></script>
  <script src="./js/midi-player.js"></script>
  <script src="./js/particles.js"></script>
  <script src="./js/piano.js"></script>
  <script src="./js/waterfall.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
